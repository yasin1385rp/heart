<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Love Heart Animation - Light Edition</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0b10 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        #ui {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .love_word {
            position: absolute;
            color: #ea80b0;
            font-weight: bold;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 0 50px rgba(234, 128, 176, 0.3);
            letter-spacing: 2px;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            opacity: 0.95;
            user-select: none;
            will-change: transform, left, top, color, opacity;
        }

        .heart-glow {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(234, 128, 176, 0.15) 0%, rgba(234, 128, 176, 0.05) 50%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 0;
            will-change: transform;
        }

        .falling-heart {
            position: absolute;
            font-size: 0.8rem;
            opacity: 0.2;
            animation: fallDown linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fallDown {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.25; }
            90% { opacity: 0.25; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        
        .title-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.9rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            z-index: 1;
            font-weight: 300;
        }

        /* متن عاشقانه */
        .romantic-text {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(234, 128, 176, 0.7);
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(234, 128, 176, 0.2);
            z-index: 3;
            font-weight: 300;
            font-family: 'Georgia', serif;
            animation: fadeText 8s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes fadeText {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            20%, 80% { opacity: 1; transform: translateX(-50%) translateY(0px); }
        }

        /* نور بالای قلب */
        .spotlight {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse at center, rgba(234, 128, 176, 0.06) 0%, transparent 70%);
            filter: blur(20px);
            pointer-events: none;
            z-index: -2;
            animation: spotlightMove 6s ease-in-out infinite alternate;
        }

        @keyframes spotlightMove {
            0% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        /* خط ضربان قلب */
        .pulse-ring {
            position: absolute;
            width: 450px;
            height: 450px;
            border: 1px solid rgba(234, 128, 176, 0.12);
            border-radius: 50%;
            z-index: -1;
            animation: pulseRing 2.5s ease-out infinite;
            pointer-events: none;
        }

        @keyframes pulseRing {
            0% { transform: scale(0.85); opacity: 0; }
            30% { opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 1.25s;
        }

        /* گلبرگ */
        .petal {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, #ff69b4, #c71586);
            border-radius: 50% 0 50% 50%;
            opacity: 0.15;
            animation: fallPetal linear infinite;
            pointer-events: none;
            z-index: 0;
            transform: rotate(45deg);
            will-change: transform;
        }

        @keyframes fallPetal {
            0% { transform: translateX(0) translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.25; }
            90% { opacity: 0.25; }
            100% { transform: translateX(50px) translateY(110vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        /* دود */
        .mist {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, rgba(234, 128, 176, 0.04) 0%, transparent 100%);
            filter: blur(15px);
            z-index: 1;
            pointer-events: none;
            animation: mistWave 5s ease-in-out infinite alternate;
        }

        @keyframes mistWave {
            0% { opacity: 0.3; transform: translateY(0); }
            100% { opacity: 0.6; transform: translateY(-5px); }
        }

        /* اسپارکل */
        .sparkle {
            position: absolute;
            color: #ff69b4;
            font-size: 0.6rem;
            pointer-events: none;
            z-index: 1;
            animation: sparkleAnim 3s ease-in-out infinite;
            opacity: 0;
            will-change: transform, opacity;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1) rotate(180deg); opacity: 0.7; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="romantic-text">✨ You are my everything ✨</div>
    <div class="spotlight"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="mist"></div>

    <div id="ui">
        <div class="heart-glow"></div>
    </div>
    
    <div class="title-text">💕 For You 💕</div>

    <script>
        // ------------------ کد اصلی قلب (بهینه شده) ------------------
        const container = document.getElementById('ui');
        const wordText = "I love you ";
        const numWords = 80; // کاهش از 100 برای سرعت بیشتر (شکل قلب همچنان عالی است)
        const scale = 200;

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x: x, y: y };
        }

        const words = [];
        const centerX = 250;
        const centerY = 250;

        for (let i = 0; i < numWords; i++) {
            const wordDiv = document.createElement('div');
            wordDiv.className = 'love_word';
            
            const randomSize = 1 + (Math.random() * 0.2);
            wordDiv.style.fontSize = (1.2 * randomSize) + 'rem';
            
            if (Math.random() > 0.8) {
                wordDiv.style.transform = 'translate(-50%, -50%) rotate(' + (Math.random() * 6 - 3) + 'deg)';
            }
            
            wordDiv.textContent = wordText;
            
            const t = (i / numWords) * 2 * Math.PI;
            const point = getHeartPoint(t);
            
            const xPos = centerX + (point.x * scale / 17);
            const yPos = centerY + (point.y * scale / 17);
            
            wordDiv.style.left = xPos + 'px';
            wordDiv.style.top = yPos + 'px';
            
            words.push({
                element: wordDiv,
                index: i
            });
            
            container.appendChild(wordDiv);
        }

        let startTime = Date.now();
        
        function animateWords() {
            const currentTime = Date.now();
            const elapsed = (currentTime - startTime) / 1000;
            const speed = 0.25; // کاهش سرعت برای روانی بیشتر
            
            for (let j = 0; j < words.length; j++) {
                const item = words[j];
                const baseAngle = (item.index / numWords) * 2 * Math.PI;
                const newAngle = baseAngle + (elapsed * speed);
                
                const point = getHeartPoint(newAngle);
                
                const xPos = centerX + (point.x * scale / 17);
                const yPos = centerY + (point.y * scale / 17);
                
                item.element.style.left = xPos + 'px';
                item.element.style.top = yPos + 'px';
                
                const hue = (340 + (item.index * 0.5) + (elapsed * 20)) % 360;
                const brightness = 70 + Math.sin(elapsed + item.index) * 8;
                item.element.style.color = `hsl(${hue}, 80%, ${brightness}%)`;
                item.element.style.textShadow = `0 0 20px hsl(${hue}, 80%, 50%), 0 0 40px hsl(${hue}, 80%, 30%)`;
                
                const opacity = 0.8 + Math.sin(elapsed * 0.5 + item.index * 0.3) * 0.15;
                item.element.style.opacity = opacity;
            }
            
            requestAnimationFrame(animateWords);
        }

        animateWords();

        // ------------------ ذرات (کاهش یافته) ------------------
        function createParticles() {
            const container = document.body;
            for (let i = 0; i < 30; i++) { // کاهش از 80 به 30
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 2 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.opacity = Math.random() * 0.3;
                
                const duration = 15 + Math.random() * 25;
                const delay = Math.random() * 10;
                particle.style.animation = `floatParticle ${duration}s ease-in-out ${delay}s infinite alternate`;
                
                container.appendChild(particle);
            }
        }

        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes floatParticle {
                0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
                100% { transform: translate(${Math.random() > 0.5 ? '' : '-'}20px, ${Math.random() > 0.5 ? '' : '-'}20px) scale(1.3); opacity: 0.4; }
            }
        `;
        document.head.appendChild(styleSheet);

        createParticles();

        // ------------------ قلب‌های بارش (کاهش یافته) ------------------
        function createFallingHearts() {
            const container = document.body;
            const heartSymbols = ['♥', '❤', '💖', '💕'];
            
            for (let i = 0; i < 8; i++) { // کاهش از 15 به 8
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (0.5 + Math.random() * 0.8) + 'rem';
                heart.style.opacity = 0.1 + Math.random() * 0.1;
                heart.style.animationDuration = (20 + Math.random() * 25) + 's';
                heart.style.animationDelay = (Math.random() * 15) + 's';
                
                const hue = 330 + Math.random() * 30;
                heart.style.color = `hsl(${hue}, 80%, 70%)`;
                
                container.appendChild(heart);
            }
        }

        createFallingHearts();

        // ------------------ گلبرگ‌ها (کاهش یافته) ------------------
        function createPetals() {
            const container = document.body;
            const colors = ['#ff69b4', '#ff1493', '#c71586'];
            
            for (let i = 0; i < 6; i++) { // کاهش از 12 به 6
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.background = colors[Math.floor(Math.random() * colors.length)];
                petal.style.width = (10 + Math.random() * 10) + 'px';
                petal.style.height = (10 + Math.random() * 10) + 'px';
                petal.style.animationDuration = (15 + Math.random() * 15) + 's';
                petal.style.animationDelay = (Math.random() * 10) + 's';
                petal.style.opacity = 0.1 + Math.random() * 0.1;
                
                container.appendChild(petal);
            }
        }

        createPetals();

        // ------------------ اسپارکل‌ها (کاهش یافته) ------------------
        function createSparkles() {
            const container = document.body;
            const symbols = ['✦', '✧', '♥', '✶'];
            
            for (let i = 0; i < 10; i++) { // کاهش از 20 به 10
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                
                const angle = Math.random() * 2 * Math.PI;
                const radius = 150 + Math.random() * 150;
                const x = 50 + (Math.cos(angle) * radius / 5);
                const y = 50 + (Math.sin(angle) * radius / 5);
                
                sparkle.style.left = x + '%';
                sparkle.style.top = y + '%';
                sparkle.style.animationDelay = (Math.random() * 5) + 's';
                sparkle.style.animationDuration = (3 + Math.random() * 3) + 's';
                sparkle.style.fontSize = (0.5 + Math.random() * 0.5) + 'rem';
                
                const hue = 300 + Math.random() * 60;
                sparkle.style.color = `hsl(${hue}, 80%, 70%)`;
                sparkle.style.textShadow = `0 0 15px hsl(${hue}, 80%, 50%)`;
                
                container.appendChild(sparkle);
            }
        }

        createSparkles();
    </script>
</body>
</html>
