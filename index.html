<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💖 Love Heart - Beautiful Love Animation 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0b10 0%, #000000 100%);
            overflow-x: hidden;
            overflow-y: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        #ui {
            position: relative;
            width: min(90vw, 700px);
            height: min(90vw, 700px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .love_word {
            position: absolute;
            font-weight: bold;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 0 50px rgba(234, 128, 176, 0.3);
            letter-spacing: 2px;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            opacity: 0.95;
            pointer-events: none;
            font-size: clamp(0.7rem, 3.5vw, 1rem);
            z-index: 5;
        }

        .heart-glow {
            position: absolute;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(234, 128, 176, 0.25) 0%, rgba(234, 128, 176, 0.1) 50%, transparent 70%);
            filter: blur(50px);
            z-index: -1;
            animation: pulseGlow 1.15s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        .title-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: clamp(0.6rem, 3vw, 0.8rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            z-index: 1;
            font-weight: 300;
            white-space: nowrap;
        }

        .romantic-text {
            position: fixed;
            top: max(20px, 5vh);
            left: 50%;
            transform: translateX(-50%);
            color: rgba(234, 128, 176, 0.7);
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(234, 128, 176, 0.2);
            z-index: 20;
            font-weight: 300;
            font-family: 'Georgia', serif;
            animation: fadeText 8s ease-in-out infinite;
            white-space: nowrap;
        }

        @keyframes fadeText {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            20%, 80% { opacity: 1; transform: translateX(-50%) translateY(0px); }
        }

        .spotlight {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 500px;
            height: 70%;
            max-height: 500px;
            background: radial-gradient(ellipse at center, rgba(234, 128, 176, 0.08) 0%, transparent 70%);
            filter: blur(20px);
            pointer-events: none;
            z-index: -2;
            animation: spotlightMove 6s ease-in-out infinite alternate;
        }

        @keyframes spotlightMove {
            0% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        .mist {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, rgba(234, 128, 176, 0.04) 0%, transparent 100%);
            filter: blur(15px);
            z-index: 1;
            pointer-events: none;
            animation: mistWave 5s ease-in-out infinite alternate;
        }

        @keyframes mistWave {
            0% { opacity: 0.2; transform: translateY(0); }
            100% { opacity: 0.6; transform: translateY(-5px); }
        }

        .falling-particle, .falling-heart, .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
        }
        
        .falling-particle {
            border-radius: 50%;
            top: -10px;
        }

        .falling-heart {
            top: -20px;
        }

        .sparkle {
            top: -20px;
            font-size: 0.5rem;
            animation: sparkleAnim 3s ease-in-out infinite;
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1) rotate(180deg); }
        }

        @media (max-width: 768px) {
            .love_word { letter-spacing: 1px; }
            .romantic-text { top: 15px; letter-spacing: 2px; }
            .title-text { bottom: 15px; letter-spacing: 4px; }
        }

        @media (max-width: 480px) {
            .love_word { letter-spacing: 0.5px; font-size: clamp(0.6rem, 3vw, 0.8rem); }
            .romantic-text { font-size: 0.75rem; white-space: nowrap; padding: 0 10px; }
            .title-text { font-size: 0.45rem; letter-spacing: 3px; }
        }

        @media (min-width: 1200px) {
            #ui { width: 750px; height: 750px; }
            .love_word { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="romantic-text">✨ You are my everything ✨</div>
    <div class="spotlight"></div>
    <div class="mist"></div>

    <div id="ui">
        <div class="heart-glow"></div>
    </div>
    
    <div class="title-text">💕 For You 💕</div>

    <script>
        (function() {
            // تشخیص موبایل
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            const container = document.getElementById('ui');
            
            let beatIntensity = 0;
            let words = [];
            let animStartTime = Date.now();
            let loveWordsAnimationId = null;
            
            // ضربان قلب مصنوعی برای هاله
            let lastBeatTime = 0;
            let time = 0;
            
            // شبیه‌سازی ضربان قلب برای هاله
            function simulateHeartbeat() {
                time += 0.016;
                const beatFrequency = 1.2; // ضربان در ثانیه
                const beatValue = Math.sin(time * Math.PI * 2 * beatFrequency);
                
                if (beatValue > 0.95 && (time - lastBeatTime) > 0.4) {
                    lastBeatTime = time;
                    beatIntensity = 1;
                    
                    const heartGlow = document.querySelector('.heart-glow');
                    if (heartGlow) {
                        heartGlow.style.animation = 'none';
                        heartGlow.offsetHeight;
                        heartGlow.style.animation = 'pulseGlow 1.15s ease-in-out infinite alternate';
                    }
                }
                
                beatIntensity *= 0.94;
                requestAnimationFrame(simulateHeartbeat);
            }
            
            function getHeartPoint(t) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const slimFactor = 0.86;
                return { x: x * slimFactor, y: y };
            }
            
            function rebuildHeart() {
                words.forEach(item => {
                    if (item.element && item.element.remove) item.element.remove();
                });
                words = [];
                
                const containerWidth = container.clientWidth;
                const baseSize = 700;
                const scaleFactor = containerWidth / baseSize;
                const centerX = containerWidth / 2;
                const centerY = containerWidth / 2;
                const heartScale = 220 * scaleFactor;
                
                let numWords;
                if (isMobile) {
                    numWords = containerWidth < 400 ? 30 : 36;
                } else {
                    numWords = Math.min(52, Math.max(42, Math.floor(48 * scaleFactor)));
                }
                
                const fragment = document.createDocumentFragment();
                
                for (let i = 0; i < numWords; i++) {
                    const wordDiv = document.createElement('div');
                    wordDiv.className = 'love_word';
                    wordDiv.textContent = "I love you ";
                    
                    const t = (i / numWords) * 2 * Math.PI;
                    const point = getHeartPoint(t);
                    
                    const xPos = centerX + (point.x * heartScale / 16);
                    const yPos = centerY + (point.y * heartScale / 16);
                    
                    wordDiv.style.left = xPos + 'px';
                    wordDiv.style.top = yPos + 'px';
                    wordDiv.style.transform = 'translate(-50%, -50%)';
                    wordDiv.style.opacity = '0.92';
                    
                    words.push({
                        element: wordDiv,
                        index: i,
                        angle: t
                    });
                    
                    fragment.appendChild(wordDiv);
                }
                
                container.appendChild(fragment);
            }
            
            function animateLoveWords(now) {
                if (words.length === 0) return;
                
                const elapsed = (now - animStartTime) / 1000;
                const speed = 0.18;
                const containerWidth = container.clientWidth;
                const baseSize = 700;
                const scaleFactor = containerWidth / baseSize;
                const centerX = containerWidth / 2;
                const centerY = containerWidth / 2;
                const heartScale = 220 * scaleFactor;
                
                for (let j = 0; j < words.length; j++) {
                    const item = words[j];
                    const newAngle = item.angle + (elapsed * speed);
                    const point = getHeartPoint(newAngle);
                    
                    const xPos = centerX + (point.x * heartScale / 16);
                    const yPos = centerY + (point.y * heartScale / 16);
                    
                    item.element.style.left = xPos + 'px';
                    item.element.style.top = yPos + 'px';
                    
                    const hue = (340 + (item.index * 0.7) + (elapsed * 12) + (beatIntensity * 35)) % 360;
                    item.element.style.color = `hsl(${hue}, 85%, 68%)`;
                    item.element.style.textShadow = `0 0 ${5 + beatIntensity * 12}px hsl(${hue}, 85%, 60%)`;
                }
                
                loveWordsAnimationId = requestAnimationFrame(animateLoveWords);
            }
            
            // ================== بارش پارتیکل‌ها ==================
            function createFallingParticles() {
                const particleCount = isMobile ? 18 : 35;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'falling-particle';
                    const size = Math.random() * 2.5 + 0.8;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.background = `rgba(234, 128, 176, ${0.2 + Math.random() * 0.5})`;
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.boxShadow = `0 0 ${size}px rgba(234, 128, 176, 0.5)`;
                    
                    const duration = 5 + Math.random() * 12;
                    const delay = Math.random() * 15;
                    particle.style.animation = `fallParticle ${duration}s linear ${delay}s infinite`;
                    
                    document.body.appendChild(particle);
                }
            }
            
            function createFallingHearts() {
                const heartSymbols = ['♥', '❤', '💖', '💗', '💓'];
                const heartCount = isMobile ? 8 : 15;
                
                for (let i = 0; i < heartCount; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'falling-heart';
                    heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.fontSize = (0.7 + Math.random() * 0.6) + 'rem';
                    
                    const hue = 330 + Math.random() * 30;
                    heart.style.color = `hsl(${hue}, 85%, 70%)`;
                    heart.style.textShadow = `0 0 8px hsl(${hue}, 85%, 60%)`;
                    
                    const duration = 6 + Math.random() * 14;
                    const delay = Math.random() * 12;
                    const sway = 15 + Math.random() * 30;
                    
                    heart.style.animation = `fallHeart ${duration}s linear ${delay}s infinite`;
                    heart.style.setProperty('--sway', sway + 'px');
                    
                    document.body.appendChild(heart);
                }
            }
            
            function createFallingSparkles() {
                const symbols = ['✦', '✧', '⭐', '💕', '⚘'];
                const sparkleCount = isMobile ? 10 : 20;
                
                for (let i = 0; i < sparkleCount; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    sparkle.style.position = 'fixed';
                    sparkle.style.left = Math.random() * 100 + '%';
                    sparkle.style.top = '-20px';
                    sparkle.style.animation = `fallSparkle ${4 + Math.random() * 8}s linear ${Math.random() * 12}s infinite`;
                    sparkle.style.fontSize = (0.5 + Math.random() * 0.5) + 'rem';
                    
                    const hue = 300 + Math.random() * 60;
                    sparkle.style.color = `hsl(${hue}, 85%, 70%)`;
                    
                    document.body.appendChild(sparkle);
                }
            }
            
            const fallingStyles = document.createElement("style");
            fallingStyles.textContent = `
                @keyframes fallParticle {
                    0% { transform: translateY(-10vh) translateX(0) scale(0.5); opacity: 0; }
                    20% { opacity: 0.6; }
                    80% { opacity: 0.4; }
                    100% { transform: translateY(110vh) translateX(${Math.random() * 40 - 20}px) scale(1.1); opacity: 0; }
                }
                
                @keyframes fallHeart {
                    0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
                    20% { opacity: 0.7; }
                    50% { transform: translateY(50vh) rotate(180deg) translateX(calc(var(--sway, 20px) * 0.5)); }
                    80% { opacity: 0.5; }
                    100% { transform: translateY(110vh) rotate(360deg) translateX(var(--sway, 20px)); opacity: 0; }
                }
                
                @keyframes fallSparkle {
                    0% { transform: translateY(-10vh) rotate(0deg) scale(0.4); opacity: 0; }
                    25% { opacity: 0.7; transform: translateY(30vh) rotate(120deg) scale(0.9); }
                    75% { opacity: 0.4; }
                    100% { transform: translateY(110vh) rotate(360deg) scale(0.5); opacity: 0; }
                }
            `;
            document.head.appendChild(fallingStyles);
            
            // راه‌اندازی
            rebuildHeart();
            createFallingParticles();
            createFallingHearts();
            createFallingSparkles();
            
            // شروع انیمیشن‌ها
            loveWordsAnimationId = requestAnimationFrame(animateLoveWords);
            simulateHeartbeat();
            
            // رویداد resize
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    rebuildHeart();
                }, 150);
            });
            
            // Cleanup
            window.addEventListener('beforeunload', () => {
                if (loveWordsAnimationId) cancelAnimationFrame(loveWordsAnimationId);
            });
            
            console.log('✨ Beautiful Love Heart - ECG removed, all other effects preserved! ✨');
        })();
    </script>
</body>
</html>
